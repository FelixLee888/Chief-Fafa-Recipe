name: Build and Publish gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Refresh recipes from Google Docs
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_SUBJECT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_SUBJECT }}
          GOOGLE_DOCS_DRIVE_QUERY: ${{ vars.GOOGLE_DOCS_DRIVE_QUERY }}
          GOOGLE_DOCS_CLIENT_ID: ${{ secrets.GOOGLE_DOCS_CLIENT_ID }}
          GOOGLE_DOCS_CLIENT_SECRET: ${{ secrets.GOOGLE_DOCS_CLIENT_SECRET }}
          GOOGLE_DOCS_REFRESH_TOKEN: ${{ secrets.GOOGLE_DOCS_REFRESH_TOKEN }}
          GOOGLE_DOCS_ACCESS_TOKEN: ${{ secrets.GOOGLE_DOCS_ACCESS_TOKEN }}
          GOOGLE_KEEP_CLIENT_ID: ${{ secrets.GOOGLE_KEEP_CLIENT_ID }}
          GOOGLE_KEEP_CLIENT_SECRET: ${{ secrets.GOOGLE_KEEP_CLIENT_SECRET }}
          GOOGLE_KEEP_REFRESH_TOKEN: ${{ secrets.GOOGLE_KEEP_REFRESH_TOKEN }}
          GOOGLE_KEEP_ACCESS_TOKEN: ${{ secrets.GOOGLE_KEEP_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/refresh_from_doc_ids.mjs

      - name: Build static site
        env:
          SITE_BASE_PATH: /${{ github.event.repository.name }}
        run: node scripts/build-site.mjs

      - name: Publish to gh-pages branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd site
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish."
            exit 0
          fi
          git commit -m "Deploy site from main (${GITHUB_SHA:0:7})"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
